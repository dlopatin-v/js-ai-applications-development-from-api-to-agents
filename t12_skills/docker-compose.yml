version: '3.8'

# The node-code-sandbox MCP server (mcp/node-code-sandbox) is launched automatically
# by the agent via `docker run --rm -i mcp/node-code-sandbox` — no persistent service
# needs to be started here.
#
# Make sure the Docker image is available locally before running the custom agent:
#   docker pull mcp/node-code-sandbox

services: {}
